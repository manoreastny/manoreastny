<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4a05a"/>
      <stop offset="100%" stop-color="#dfc28a"/>
    </linearGradient>
    <linearGradient id="mGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0c0e0b"/>
      <stop offset="100%" stop-color="#1a1a0f"/>
    </linearGradient>
  </defs>

  <!-- Gold rounded square background -->
  <rect x="0" y="0" width="64" height="64" rx="14" ry="14" fill="url(#goldGrad)"/>

  <!-- Subtle inner shadow / depth -->
  <rect x="1" y="1" width="62" height="62" rx="13" ry="13" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

  <!-- M letterform — serif style matching Cormorant Garamond -->
  <!-- Built from paths to give it a refined serif feel -->
  <text
    x="32"
    y="47"
    font-family="Cormorant Garamond, Georgia, serif"
    font-size="40"
    font-weight="500"
    text-anchor="middle"
    fill="url(#mGrad)"
    letter-spacing="-1"
  >M</text>
</svg>
